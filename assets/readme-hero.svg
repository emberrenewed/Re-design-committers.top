<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">committers.top animated 3D data pipeline</title>
  <desc id="desc">An animated SVG showing GitHub data flowing through a ranking engine into website and badge outputs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.48" stop-color="#0d2a38"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1">
      <stop offset="0" stop-color="#12263d" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#0e1726" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" x2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" x2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .route {
        stroke-dasharray: 10 14;
        animation: flow 3.8s linear infinite;
      }
      .pulse {
        animation: pulse 2.6s ease-in-out infinite;
        transform-origin: center;
      }
      .float {
        animation: float 5.2s ease-in-out infinite;
      }
      .scan {
        animation: scan 4.4s ease-in-out infinite;
      }
      .blink {
        animation: blink 1.6s ease-in-out infinite;
      }
      @keyframes flow {
        to { stroke-dashoffset: -96; }
      }
      @keyframes pulse {
        0%, 100% { opacity: .72; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.08); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-9px); }
      }
      @keyframes scan {
        0%, 100% { transform: translateX(-135px); opacity: .08; }
        45%, 55% { opacity: .42; }
        50% { transform: translateX(135px); }
      }
      @keyframes blink {
        0%, 56%, 100% { opacity: .35; }
        58%, 82% { opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .route, .pulse, .float, .scan, .blink { animation: none; }
      }
    </style>
  </defs>

  <rect width="1200" height="420" rx="34" fill="url(#bg)"/>
  <path d="M0 332 C170 295 280 374 430 335 C603 291 689 250 842 300 C995 351 1089 289 1200 261 L1200 420 L0 420 Z" fill="#0f766e" opacity=".16"/>

  <g opacity=".22" stroke="#94a3b8" stroke-width="1">
    <path d="M70 360 L330 118 L1076 118 L900 360 Z" fill="none"/>
    <path d="M126 360 L375 118"/>
    <path d="M184 360 L420 118"/>
    <path d="M242 360 L465 118"/>
    <path d="M300 360 L510 118"/>
    <path d="M358 360 L555 118"/>
    <path d="M416 360 L600 118"/>
    <path d="M474 360 L645 118"/>
    <path d="M532 360 L690 118"/>
    <path d="M590 360 L735 118"/>
    <path d="M648 360 L780 118"/>
    <path d="M706 360 L825 118"/>
    <path d="M764 360 L870 118"/>
    <path d="M822 360 L915 118"/>
    <path d="M880 360 L960 118"/>
    <path d="M938 360 L1005 118"/>
    <path d="M118 315 L954 315"/>
    <path d="M170 270 L993 270"/>
    <path d="M221 225 L1028 225"/>
    <path d="M275 178 L1061 178"/>
    <path d="M330 118 L1076 118"/>
  </g>

  <g transform="translate(62 52)">
    <rect width="416" height="268" rx="22" fill="url(#panel)" stroke="#2dd4bf" stroke-opacity=".28"/>
    <rect x="22" y="22" width="372" height="38" rx="12" fill="#020617" opacity=".78"/>
    <circle cx="44" cy="41" r="5" fill="#f87171"/>
    <circle cx="62" cy="41" r="5" fill="#facc15"/>
    <circle cx="80" cy="41" r="5" fill="#4ade80"/>
    <text x="22" y="97" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">committers.top</text>
    <text x="24" y="132" fill="#bae6fd" font-family="Segoe UI, Arial, sans-serif" font-size="17">Rank GitHub activity by region, organization, and public impact.</text>

    <g transform="translate(24 166)" font-family="Consolas, 'Courier New', monospace" font-size="16">
      <text y="0" fill="#38bdf8">$ go run . --preset worldwide</text>
      <text y="31" fill="#a7f3d0">query GitHub GraphQL</text>
      <text y="62" fill="#fde68a">sort contributors and organizations</text>
      <text y="93" fill="#ddd6fe">export plain, csv, or yaml</text>
      <rect class="scan" x="170" y="-22" width="78" height="122" fill="#67e8f9" opacity=".12"/>
      <rect class="blink" x="348" y="-14" width="10" height="20" fill="#67e8f9"/>
    </g>
  </g>

  <g fill="none" stroke-width="4" stroke-linecap="round" opacity=".88">
    <path class="route" d="M500 188 C555 132 613 132 672 188" stroke="url(#cyan)"/>
    <path class="route" d="M500 234 C566 293 620 296 688 244" stroke="url(#orange)"/>
    <path class="route" d="M725 206 C805 150 889 150 974 204" stroke="url(#violet)"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <g class="pulse" filter="url(#softGlow)">
      <circle cx="548" cy="206" r="34" fill="#0891b2"/>
      <text x="548" y="212" fill="#ecfeff" font-size="15" font-weight="700">API</text>
    </g>
    <g class="pulse" style="animation-delay:.45s" filter="url(#softGlow)">
      <circle cx="682" cy="206" r="42" fill="#16a34a"/>
      <text x="682" y="205" fill="#f0fdf4" font-size="14" font-weight="700">RANK</text>
      <text x="682" y="224" fill="#dcfce7" font-size="12">ENGINE</text>
    </g>
    <g class="pulse" style="animation-delay:.9s" filter="url(#softGlow)">
      <circle cx="965" cy="206" r="36" fill="#7c3aed"/>
      <text x="965" y="212" fill="#faf5ff" font-size="15" font-weight="700">SITE</text>
    </g>
  </g>

  <g class="float" transform="translate(770 60)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="-4 185 138" to="356 185 138" dur="18s" repeatCount="indefinite"/>
      <polygon points="184,16 314,80 184,147 54,80" fill="url(#cyan)" opacity=".86"/>
      <polygon points="54,80 184,147 184,286 54,217" fill="#075985" opacity=".86"/>
      <polygon points="314,80 184,147 184,286 314,217" fill="#0f766e" opacity=".86"/>
      <polygon points="184,60 264,98 184,139 104,98" fill="#ecfeff" opacity=".22"/>
      <line x1="184" y1="16" x2="184" y2="286" stroke="#cffafe" stroke-opacity=".36"/>
      <line x1="54" y1="80" x2="314" y2="217" stroke="#cffafe" stroke-opacity=".3"/>
      <line x1="314" y1="80" x2="54" y2="217" stroke="#cffafe" stroke-opacity=".3"/>
      <circle cx="184" cy="16" r="6" fill="#fbbf24" filter="url(#softGlow)"/>
      <circle cx="314" cy="80" r="6" fill="#67e8f9" filter="url(#softGlow)"/>
      <circle cx="184" cy="286" r="6" fill="#a7f3d0" filter="url(#softGlow)"/>
      <circle cx="54" cy="217" r="6" fill="#f0abfc" filter="url(#softGlow)"/>
    </g>
  </g>

  <g transform="translate(770 334)" font-family="Segoe UI, Arial, sans-serif">
    <rect width="356" height="42" rx="14" fill="#020617" opacity=".72" stroke="#38bdf8" stroke-opacity=".28"/>
    <text x="24" y="27" fill="#e0f2fe" font-size="15">GraphQL -> Go CLI -> YAML -> GitHub Pages -> Shields</text>
  </g>

  <g opacity=".72">
    <circle class="pulse" cx="1128" cy="66" r="4" fill="#fbbf24"/>
    <circle class="pulse" style="animation-delay:.3s" cx="1068" cy="88" r="3" fill="#67e8f9"/>
    <circle class="pulse" style="animation-delay:.6s" cx="1160" cy="128" r="5" fill="#a7f3d0"/>
    <circle class="pulse" style="animation-delay:.9s" cx="1028" cy="52" r="3" fill="#ddd6fe"/>
  </g>
</svg>
